# Automatischer Deploy auf deal-circle.at bei jedem Push auf main.
#
# Mechanik: per SSH wird das vorhandene deploy-server.sh auf dem VPS ausgeführt.
# Das Skript klont main frisch, baut Frontend (Next.js static export) + Backend,
# restartet die API (systemd → DB-Migration läuft) und reloaded nginx.
#
# Benötigte Repo-Secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     Host/IP des VPS (das echte Ziel hinter dem SSH-Alias "srhomes-vps")
#   DEPLOY_SSH_KEY  privater SSH-Key (PEM), dessen Public-Key am VPS in
#                   ~/.ssh/authorized_keys des Deploy-Users liegt
#   DEPLOY_USER     SSH-User (optional, Default: root — deploy-server.sh braucht root)
#   DEPLOY_PORT     SSH-Port (optional, Default: 22)
#
# Manuell auslösen: Actions → "Deploy zu deal-circle.at" → "Run workflow".

name: Deploy zu deal-circle.at

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Nie zwei Deploys gleichzeitig; laufenden Deploy nicht abbrechen.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy-Secrets prüfen
        id: gate
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::warning::Deploy übersprungen — bitte Repo-Secrets DEPLOY_HOST und DEPLOY_SSH_KEY (optional DEPLOY_USER/DEPLOY_PORT) setzen."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Auf den Server deployen (deploy-server.sh)
        if: steps.gate.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -uo pipefail
          PORT="${DEPLOY_PORT:-22}"
          USER_AT="${DEPLOY_USER:-root}"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          # Gemeinsame SSH-Optionen: schnell scheitern (ConnectTimeout) statt ~2 min
          # zu hängen; lange Sitzung am Leben halten (ServerAlive).
          SSH_OPTS="-i $HOME/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o ConnectTimeout=25 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          # Deploy mit Retry — der VPS-SSH timed gelegentlich aus (flaky).
          n=0
          until [ "$n" -ge 3 ]; do
            n=$((n+1))
            echo "→ Deploy-Versuch $n/3 …"
            ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
            if scp $SSH_OPTS -P "$PORT" deploy-server.sh "$USER_AT@$DEPLOY_HOST:/tmp/deploy-server.sh" \
               && ssh $SSH_OPTS -p "$PORT" "$USER_AT@$DEPLOY_HOST" 'BRANCH=main bash /tmp/deploy-server.sh'; then
              echo "✓ Deploy erfolgreich (Versuch $n)."
              exit 0
            fi
            echo "⚠ Versuch $n fehlgeschlagen."
            [ "$n" -lt 3 ] && sleep 15
          done
          echo "✗ Deploy nach 3 Versuchen fehlgeschlagen — VPS per SSH nicht erreichbar."
          exit 1
